<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}VRFrag{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img" aria-label="">
            <path d="M7 7a5 5 0 0 1 10 0v2h1a2 2 0 0 1 2 2v3a6 6 0 0 1-6 6h-4a6 6 0 0 1-6-6v-3a2 2 0 0 1 2-2h1V7zm2 2h6V7a3 3 0 0 0-6 0v2zm-2 4v3a4 4 0 0 0 4 4h4a4 4 0 0 0 4-4v-3H7z"/>
          </svg>
        </div>
        <div class="brand-title">
          <strong>VRFrag</strong>
          <span>Events · Teams · Stats</span>
        </div>
      </div>

      <nav class="nav" aria-label="Primary">
        <a href="/" class="{% if request.path == '/' %}active{% endif %}">Event Manager</a>
        <a href="/teams" class="{% if request.path.startswith('/teams') %}active{% endif %}">Team-Generator</a>
        <a href="/dashboard" class="{% if request.path.startswith('/dashboard') %}active{% endif %}">Dashboard</a>
      </nav>
    </div>
  </header>

  <main class="container page">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    © <span data-current-year></span> VRFrag
  </footer>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
